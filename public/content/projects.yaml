    description: "Centralized optical warehouse system for MedPlus managing prescription-based orders from creation to store dispatch — including lab replenishment, inventory assignment, PO/GRN generation, product catalog with Solr search, and warehouse-to-store mapping. Replaced manual order processing scattered across stores."
